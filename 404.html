<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Page not found</title>
    <meta name="robots" content="noindex" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧰</text></svg>"
    />
    <script>
      // Match the saved/OS theme before paint.
      (function () {
        var saved = localStorage.getItem('web_tools.theme');
        var dark =
          saved === 'dark' ||
          (saved === null &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.dataset.theme = 'dark';
      })();
    </script>
    <style>
      :root {
        --bg: #fafaf7;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --accent: #2a6df4;
        --accent-hover: #1f56cc;
      }
      html[data-theme="dark"] {
        --bg: #15151a;
        --fg: #f1f1f4;
        --muted: #9a9aa3;
        --accent: #6da3ff;
        --accent-hover: #8db8ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
        text-align: center;
      }
      .code {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0;
      }
      p {
        color: var(--muted);
        margin: 0.5rem 0 1.75rem;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      a:hover { color: var(--accent-hover); }
    </style>
  </head>
  <body>
    <main>
      <p class="code">404</p>
      <p>This page doesn't exist.</p>
      <a href="/">← Back to home</a>
    </main>
  </body>
</html>
